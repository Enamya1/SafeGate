<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiaoWu Visual Search Tester</title>
    <style>
        :root {
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color-scheme: light dark;
        }
        body {
            margin: 0;
            background: #0b1020;
            color: #eef2ff;
        }
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }
        .sub {
            margin: 0 0 20px;
            color: #c7d2fe;
        }
        .panel {
            background: #111a33;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cbd5e1;
        }
        input, button, textarea {
            width: 100%;
            border: 1px solid #475569;
            background: #0b1227;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="file"] {
            padding: 8px;
        }
        button {
            cursor: pointer;
            background: #2563eb;
            border-color: #1d4ed8;
            font-weight: 600;
        }
        button:hover {
            background: #1d4ed8;
        }
        .row {
            display: flex;
            gap: 12px;
            align-items: end;
        }
        .row > div {
            flex: 1;
        }
        .status {
            margin-top: 10px;
            font-size: 13px;
            color: #93c5fd;
            min-height: 18px;
        }
        .preview {
            max-height: 260px;
            border-radius: 8px;
            border: 1px solid #475569;
            margin-top: 10px;
            object-fit: contain;
            display: none;
            width: 100%;
            background: #020617;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }
        .card {
            background: #0b1227;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
        }
        .meta {
            margin-top: 8px;
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.45;
            word-break: break-word;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            max-height: 360px;
            overflow: auto;
            font-size: 12px;
            color: #e2e8f0;
        }
        @media (max-width: 820px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>XiaoWu Visual Search Tester</h1>
        <p class="sub">Test <code>POST /api/user/search/visual</code> with a real image upload.</p>

        <div class="panel">
            <div class="grid">
                <div>
                    <label for="baseUrl">Laravel API Base URL</label>
                    <input id="baseUrl" type="text" value="http://127.0.0.1:8000" />
                </div>
                <div>
                    <label for="token">Bearer Token</label>
                    <input id="token" type="text" placeholder="Paste user token here" />
                </div>
                <div>
                    <label for="topK">Top K</label>
                    <input id="topK" type="number" min="1" max="50" value="12" />
                </div>
                <div>
                    <label for="imageFile">Image File</label>
                    <input id="imageFile" type="file" accept=".jpg,.jpeg,.png,.webp,image/*" />
                </div>
            </div>

            <div class="row" style="margin-top: 12px;">
                <div>
                    <button id="searchBtn" type="button">Run Visual Search</button>
                    <div id="status" class="status"></div>
                </div>
            </div>

            <img id="preview" class="preview" alt="Selected preview" />
        </div>

        <div class="panel">
            <h3 style="margin-top:0;">Matched Products</h3>
            <div id="cards" class="cards"></div>
        </div>

        <div class="panel">
            <h3 style="margin-top:0;">Raw Response</h3>
            <pre id="rawResponse">{}</pre>
        </div>
    </div>

    <script>
        const baseUrlInput = document.getElementById("baseUrl");
        const tokenInput = document.getElementById("token");
        const topKInput = document.getElementById("topK");
        const imageFileInput = document.getElementById("imageFile");
        const searchBtn = document.getElementById("searchBtn");
        const statusEl = document.getElementById("status");
        const previewEl = document.getElementById("preview");
        const cardsEl = document.getElementById("cards");
        const rawResponseEl = document.getElementById("rawResponse");

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.color = isError ? "#fca5a5" : "#93c5fd";
        }

        function normalizeImageUrl(url, baseUrl) {
            if (!url || typeof url !== "string") return "";
            if (url.startsWith("http://") || url.startsWith("https://")) return url;
            const normalizedBase = baseUrl.replace(/\/+$/, "");
            const normalizedPath = url.startsWith("/") ? url : `/${url}`;
            return `${normalizedBase}${normalizedPath}`;
        }

        function renderProducts(products, baseUrl) {
            cardsEl.innerHTML = "";
            if (!Array.isArray(products) || products.length === 0) {
                cardsEl.innerHTML = "<div class=\"card\"><div class=\"meta\">No matched products.</div></div>";
                return;
            }

            for (const product of products) {
                const title = product?.title ?? "(No title)";
                const score = product?.visual_similarity_score;
                const thumbnail = normalizeImageUrl(product?.image_thumbnail_url, baseUrl);
                const price = product?.price ?? "-";
                const dormitory = product?.dormitory?.dormitory_name ?? "-";

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    ${thumbnail ? `<img src="${thumbnail}" alt="thumbnail" />` : "<div style=\"height:150px;border:1px solid #334155;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#94a3b8;\">No Image</div>"}
                    <div class="meta">
                        <div><strong>ID:</strong> ${product?.id ?? "-"}</div>
                        <div><strong>Title:</strong> ${title}</div>
                        <div><strong>Price:</strong> ${price}</div>
                        <div><strong>Dormitory:</strong> ${dormitory}</div>
                        <div><strong>Score:</strong> ${typeof score === "number" ? score.toFixed(6) : "-"}</div>
                    </div>
                `;
                cardsEl.appendChild(card);
            }
        }

        imageFileInput.addEventListener("change", () => {
            const file = imageFileInput.files?.[0];
            if (!file) {
                previewEl.style.display = "none";
                previewEl.removeAttribute("src");
                return;
            }
            const blobUrl = URL.createObjectURL(file);
            previewEl.src = blobUrl;
            previewEl.style.display = "block";
        });

        searchBtn.addEventListener("click", async () => {
            const file = imageFileInput.files?.[0];
            const token = tokenInput.value.trim();
            const baseUrl = baseUrlInput.value.trim().replace(/\/+$/, "");
            const topK = Math.min(50, Math.max(1, Number(topKInput.value || "12")));

            if (!baseUrl) {
                setStatus("Base URL is required.", true);
                return;
            }
            if (!token) {
                setStatus("Bearer token is required.", true);
                return;
            }
            if (!file) {
                setStatus("Please select an image file.", true);
                return;
            }

            const form = new FormData();
            form.append("image", file);
            form.append("top_k", String(topK));

            setStatus("Sending request...");
            searchBtn.disabled = true;
            cardsEl.innerHTML = "";

            try {
                const response = await fetch(`${baseUrl}/api/user/search/visual`, {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: form
                });

                let payload;
                try {
                    payload = await response.json();
                } catch {
                    payload = { raw: await response.text() };
                }

                rawResponseEl.textContent = JSON.stringify(payload, null, 2);

                if (!response.ok) {
                    const msg = payload?.message || `Request failed (${response.status})`;
                    setStatus(msg, true);
                    return;
                }

                renderProducts(payload?.products, baseUrl);
                setStatus(`Success. Found ${payload?.count ?? 0} products.`);
            } catch (error) {
                rawResponseEl.textContent = JSON.stringify({ error: String(error) }, null, 2);
                setStatus(`Network error: ${String(error)}`, true);
            } finally {
                searchBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
